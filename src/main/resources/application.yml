server:
  port: 8080

spring:
  application:
    name: ms-ticket
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ms_ticket}
    username: ${DB_USERNAME:ticket}
    password: ${DB_PASSWORD:ticket123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/ms-ticket}
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:ms-ticket}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:secret}
            authorization-grant-type: authorization_code
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/ms-ticket}
            user-name-attribute: preferred_username

## app.security.jwt removido (Keycloak gerencia tokens)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include:
            - livenessState
        readiness:
          include:
            - readinessState
            - db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true