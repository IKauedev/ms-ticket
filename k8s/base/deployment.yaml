apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-ticket
  labels:
    app: ms-ticket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-ticket
  template:
    metadata:
      labels:
        app: ms-ticket
    spec:
      containers:
        - name: ms-ticket
          image: ms-ticket:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          envFrom:
            - configMapRef:
                name: ms-ticket-config
            - secretRef:
                name: ms-ticket-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
