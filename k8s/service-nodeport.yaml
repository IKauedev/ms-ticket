apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service-nodeport
  namespace: spring-boot-demo
  labels:
    app: spring-boot-app
spec:
  selector:
    app: spring-boot-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080  # Accessible via localhost:30080
  type: NodePort
