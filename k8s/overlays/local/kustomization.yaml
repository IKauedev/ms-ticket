apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ms-ticket-local

resources:
  - ../../base
  - ../../keycloak
  - namespace.yaml
  - service-nodeport.yaml
  - ingress.yaml
  - postgres.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: ms-ticket-config
    literals:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ms_ticket
      - DB_USERNAME=ticket
      - BOOTSTRAP_USERS_ENABLED=true
      - ADMIN_USERNAME=admin
      - BOX_OFFICE_USERNAME=boxoffice
  - name: keycloak-realm-export
    files:
      - realm-export.json

secretGenerator:
  - name: ms-ticket-secret
    literals:
      - DB_PASSWORD=ticket123
      - JWT_SECRET=ms-ticket-local-development-secret-2026-secure-key
      - ADMIN_PASSWORD=dGlja2V0MTIz
      - BOX_OFFICE_PASSWORD=dGlja2V0MTIz

patches:
  - path: patch-deployment.yaml
  - path: keycloak-patch-service-nodeport.yaml

images:
  - name: ms-ticket
    newName: ms-ticket
    newTag: local
